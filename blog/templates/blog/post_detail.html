{% extends "core/base.html" %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <article>
            <header class="mb-4">
                <h1 class="fw-bolder mb-1">{{ post.title }}</h1>
                <div class="text-muted fst-italic mb-2">
                    {% blocktrans with author=post.author.username publish_date=post.publish|date:"F j, Y" %}
                    Posted on {{ publish_date }} by {{ author }}
                    {% endblocktrans %}
                </div>
            </header>
            <section class="mb-5">
                <p class="fs-5">{{ post.body|linebreaks }}</p>
            </section>
        </article>
    </div>
</div>
{% endblock %}
