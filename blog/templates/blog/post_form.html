{% extends "core/base.html" %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h2>{% trans "Write a New Post" %}</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary mt-3">{% trans "Save Draft" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
