{% extends "core/base.html" %}
{% load i18n %}

{% block content %}
<div class.row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-header"><h2>{% trans "Write a New Post" %}</h2></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary mt-3">{% trans "Save Draft" %}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
<script>
  tinymce.init({
    selector: 'textarea#id_body',
    plugins: 'autolink lists link image charmap preview anchor',
    toolbar: 'undo redo | bold italic underline | bullist numlist | link image',
    menubar: false,
    height: 400,
  });
</script>
{% endblock %}
