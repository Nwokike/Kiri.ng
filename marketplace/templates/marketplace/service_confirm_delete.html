{% extends "core/base.html" %}
{% load i18n %}

{% block content %}
<div class="container mt-4">
    <h2>{% trans "Delete Service" %}</h2>
    <p>{% blocktrans %}Are you sure you want to delete the service "{{ object.title }}"?{% endblocktrans %}</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">{% trans "Yes, Delete" %}</button>
        <a href="{% url 'marketplace:artisan-dashboard' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
    </form>
</div>
{% endblock %}
