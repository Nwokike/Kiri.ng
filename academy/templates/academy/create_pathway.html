{% extends "core/base.html" %}
{% load i18n %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                 <div class="card-header">
                    <h4>{% trans "Create Your Learning Pathway" %}</h4>
                </div>
                <div class="card-body p-4">
                    <p class="card-text">{% trans "To get started, tell us your main business goal, and our AI mentor will design a custom learning pathway just for you." %}</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-success mt-3">{% trans "Generate My Pathway" %}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
